[pytest]
testpaths = tests
pythonpath = src .
addopts = -v --tb=short
log_cli = true
log_cli_level = INFO
markers =
    unit: marks tests as unit tests (fast, no external dependencies)
    integration: marks tests as integration tests (may require external services)
    slow: marks tests as slow running
filterwarnings =
    ignore::DeprecationWarning
